about.sitetitle=About
about.title=Hi, I'm <span class="text-primary">Dani Pastor</span>
about.mission=Systems administrator with over 6 years of experience designing and maintaining critical infrastructure for businesses of all sizes.
about.story.title=My background
about.story.p1=I started managing Linux servers at a local company and gradually specialized in increasingly complex environments: virtualization, containers, networking and security. Today I manage infrastructures that can't afford to fail.
about.story.p2=I trained in Systems Administration and have spent years building on that foundation with certifications and real-world projects. Currently completing a Master's in Cybersecurity at CETI, deepening my knowledge in offensive and defensive security, SIEM and forensic analysis.
about.story.p3=I work primarily with Linux, Kubernetes, automation tools like Ansible and Terraform, and monitoring and security solutions like Zabbix, Wazuh and the ELK stack. Always focused on reliability and traceability.
about.why.title=Why work with me?
about.team.title=Core skills
about.feat.fast=Linux infrastructure
about.feat.fast.desc=Advanced administration of Debian, Ubuntu and RHEL systems in production.
about.feat.secure=Cybersecurity
