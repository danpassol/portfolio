about.sitetitle=About
about.title=Hi, I'm <span class="text-primary">Dani Pastor</span>
about.mission=ASIR student and systems administrator, I design and maintain critical infrastructure for companies of all sizes.
about.story.title=My background
about.story.p1=I started out managing Linux servers at home with virtual machines, setting up everything I saw on the internet, and over time I specialized in increasingly complex environments: Proxmox, containers, networks, and security. Today, I manage infrastructures that cannot afford to fail.
about.story.p2=I am currently studying ASIR (Networked Computer Systems Administration), although in my free time I am training for certifications and deploying real projects. I will soon be doing a master's degree in cybersecurity.
about.story.p3=I primarily work with Linux, Kubernetes, automation tools such as Ansible, and monitoring and security solutions such as Zabbix, Wazuh, and the ELK stack. I always focus on reliability and traceability.
about.why.title=Why work with me?
about.team.title=Core skills
about.feat.fast=Linux infrastructure
about.feat.fast.desc=Advanced administration of Debian, Ubuntu and RHEL systems in production.
about.feat.secure=Cybersecurity
about.feat.secure.desc=Hardening, audits, SIEM with Wazuh and vulnerability analysis.
about.feat.responsive=Containers and Kubernetes
about.feat.responsive.desc=Deployment and management of Kubernetes clusters and Docker environments in production.
about.feat.seo=Automation
about.feat.seo.desc=Infrastructure as code with Ansible and Terraform. Repeatable and auditable processes.
about.feat.dev=Monitoring
about.feat.dev.desc=Grafana, Zabbix and ELK stack for complete infrastructure visibility.
about.feat.comp=Networking and firewalls
about.feat.comp.desc=Network design, VLANs, VPNs and firewalls with pfSense and OPNsense.

about.timeline.title=Timeline
about.timeline.1.date=2023
about.timeline.1.title=First steps
about.timeline.1.desc=From a young age, I knew that I wanted to pursue this career, which is why I enrolled in the Intermediate Vocational Training Program in Microcomputer Systems and Networks at IES Henri Matisse in Valencia, where I realized that systems were my passion.
about.timeline.2.date=2025
about.timeline.2.title=Advanced Degree in ASIR
about.timeline.2.desc=I enrolled in the advanced degree program at CIPFP Mislata, where I am currently studying, specializing in networks and service deployments such as OPNsense, monitoring tools, clustering with Kubernetes, etc.
about.timeline.3.date=2026
about.timeline.3.title=Independent consulting
about.timeline.3.desc=I combine my studies with certain jobs for small and medium-sized companies, setting up networks, deploying EDRs, conducting audits, and all kinds of projects.
about.timeline.4.date=Coming soon
about.timeline.4.title=Master's in Cybersecurity
about.timeline.4.desc=Advanced training at CETI: SIEM, forensic analysis, offensive and defensive security.

