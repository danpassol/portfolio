bento.title=Infrastructure that <span class="text-primary">works for you</span>
bento.description=Well-designed systems from day one. No patch-over-patch, no accumulated technical debt.
bento.item1.title=High availability
bento.item1.desc=Architectures with real redundancy. Automatic failover, load balancing and proactive monitoring to guarantee uptime.
bento.item2.title=Infrastructure as code
