faq.default.title=Frequently asked questions
faq.default.subtitle=What people usually ask before we start working together.
faq.home.1.q=What type of companies do you work with?
faq.home.1.a=I work with SMEs, startups and mid-size companies that need solid infrastructure without maintaining a full-time internal IT team. Also with freelancers and developers who need well-configured servers.
faq.home.2.q=Do you offer ongoing support or just one-off projects?
faq.home.2.a=Both. I can handle a specific project (migration, hardening, server setup) or establish a monthly maintenance contract with a defined SLA and continuous monitoring.
faq.home.3.q=Do you work remotely or on-site?
faq.home.3.a=Primarily remote, which allows me to work with clients anywhere in Spain and Europe. For large-scale projects that require it, I can travel on-site.
faq.home.4.q=What technologies do you typically use?
faq.home.4.a=Linux in general, Kubernetes, Docker, Proxmox, pfSense/OPNsense, Ansible, Zabbix, Grafana, Wazuh and the ELK stack. For cloud, primarily self-hosted infrastructure or VPS on AWS.
faq.home.5.q=What does the onboarding process look like?
faq.home.5.a=First, a no-commitment call to understand your needs. Then I prepare a detailed proposal with scope, timeline and cost. No fine print.

