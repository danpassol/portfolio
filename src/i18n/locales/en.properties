benefits.title=Why should you trust me
benefits.subtitle=I don't just configure servers. I understand the business behind the infrastructure.
benefits.1.title=Real production experience
benefits.1.desc=I manage critical systems. No beating around the bush: real environments with real consequences.
benefits.2.title=Thorough documentation
benefits.2.desc=Everything I do gets documented. When the project ends, you have full control.
benefits.3.title=No vendor lock-in
benefits.3.desc=I work with open-source technology and industry standards. No lock-in, no surprises.
benefits.4.title=Direct communication
benefits.4.desc=No intermediaries or management layers. You talk directly to the person doing the work.
benefits.5.title=Built-in security
benefits.5.desc=Security isn't an add-on. It's present from design to deployment.
benefits.6.title=Scalable from day one
benefits.6.desc=Architectures designed to grow. What works for 10 users also works for 10,000.

