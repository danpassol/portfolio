bento.item3.title=Fast response
bento.item3.desc=Incidents handled within 2 hours during business hours, with on-call support available.
bento.item4.title=Security by default
bento.item4.desc=System hardening, security audits and best-practice compliance from the first deployment.
bento.item5.title=Continuous monitoring
bento.item5.desc=Real-time dashboards with Grafana and intelligent alerts. Know what's happening in your infrastructure before it impacts you.

