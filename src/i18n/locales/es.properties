faq.default.title=Preguntas Frecuentes
faq.default.subtitle=Todo lo que necesitas saber sobre el producto y facturación.
faq.home.1.q=¿Es este boilerplate gratuito?
faq.home.1.a=¡Sí! El template base es de código abierto y gratuito para proyectos personales y comerciales. También ofrecemos una versión Pro con características avanzadas y soporte dedicado.
faq.home.2.q=¿Necesito saber React?
faq.home.2.a=Aunque usamos React para islas interactivas, puedes usar cualquier framework que prefieras (Vue, Svelte, Solid) o simplemente JavaScript vanilla. Astro es agnóstico de framework por diseño.
faq.home.3.q=¿Cómo funciona la búsqueda?
faq.home.3.a=Usamos Pagefind, una librería de búsqueda estática que indexa tu sitio en tiempo de compilación. Proporciona resultados de búsqueda instantáneos y tolerantes a errores tipográficos sin necesidad de servidor externo o clave API.
faq.home.4.q=¿Puedo desplegar esto en Vercel/Netlify?
faq.home.4.a=Por supuesto. El template viene preconfigurado con adaptadores para Vercel, Netlify y Cloudflare Pages. Solo envía a GitHub y conecta tu repositorio.
faq.home.5.q=¿Qué lo hace "premium"?
faq.home.5.a=Además del diseño, incluimos configuraciones de nivel producción para SEO, analítica, mapas de sitio, feeds RSS, imágenes de gráfico abierto, modo oscuro y accesibilidad lista para usar.
faq.pricing.1.q=¿Puedo cambiar planes después?
faq.pricing.1.a=Sí, puedes actualizar o cambiar a una versión inferior en cualquier momento. Se aplicarán cargos prorrateados.
faq.pricing.2.q=¿Hay una prueba gratuita?
faq.pricing.2.a=Ofrecemos una prueba gratuita de 14 días en el plan Pro para que explores todas las características.
faq.pricing.3.q=¿Qué métodos de pago aceptan?
faq.pricing.3.a=Aceptamos todas las tarjetas de crédito principales, PayPal y transferencias bancarias para Enterprise.
faq.pricing.4.q=¿Ofrecen reembolsos?
faq.pricing.4.a=Sí, tenemos una garantía de devolución de dinero de 30 días si no estás satisfecho.
