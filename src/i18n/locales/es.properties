benefits.title=Por qué confiar en dpastor.eu
benefits.subtitle=No solo configuro servidores. Entiendo el negocio detrás de la infraestructura.
benefits.1.title=Experiencia real en producción
benefits.1.desc=Más de 6 años administrando sistemas críticos. No teoría: entornos reales con consecuencias reales.
benefits.2.title=Documentación exhaustiva
benefits.2.desc=Todo lo que hago queda documentado. Cuando termina el proyecto, tienes el control total.
benefits.3.title=Sin dependencia de proveedor
benefits.3.desc=Trabajo con tecnología open-source y estándares del sector. Sin lock-in, sin sorpresas.
benefits.4.title=Comunicación directa
benefits.4.desc=Sin intermediarios ni capas de gestión. Hablas directamente con quien hace el trabajo.
benefits.5.title=Seguridad integrada
benefits.5.desc=La seguridad no es un añadido. Está presente desde el diseño hasta el despliegue.
benefits.6.title=Escalable desde el día uno
benefits.6.desc=Arquitecturas diseñadas para crecer. Lo que funciona para 10 usuarios también funciona para 10.000.

