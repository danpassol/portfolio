about.sitetitle=Sobre mí
about.title=Somos <span class="text-primary">Exploradores</span>
about.mission=Nuestra misión es encontrar un nuevo hogar para la humanidad entre las estrellas, asegurando la supervivencia de nuestra especie.
about.story.title=La Misión
about.story.p1=Comenzó con la Plaga. El mundo no necesitaba más ingenieros; necesitaba agricultores. Pero sabíamos que mirar hacia abajo no era la respuesta. Teníamos que mirar hacia arriba.
about.story.p2=Las misiones Lázaro nos dieron esperanza. Doce rangers enviados a lo desconocido para encontrar mundos habitables. Construimos la Endurance no solo para explorar, sino para ver si podíamos sobrevivir.
about.story.p3=Hoy, estamos al borde de una nueva dimensión. Somos los guardianes del futuro, impulsados por un amor que trasciende el tiempo y el espacio.
about.why.title=¿Por Qué Abandonar la Tierra?
