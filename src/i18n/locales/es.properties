bento.title=Infraestructura <span class="text-primary">que trabaja para ti</span>
bento.description=Sistemas bien diseñados desde el primer día. Sin parches sobre parches, sin deuda técnica acumulada.
bento.item1.title=Alta disponibilidad
bento.item1.desc=Arquitecturas con redundancia real. Failover automático, balanceo de carga y monitorización proactiva para garantizar uptime.
bento.item2.title=Infraestructura como código
bento.item2.desc=Toda la configuración versionada y reproducible con Ansible y Terraform. Despliega en minutos, no en días.
bento.item3.title=Respuesta rápida
bento.item3.desc=Incidencias atendidas en menos de 2 horas en horario laboral con soporte de guardia disponible.
bento.item4.title=Seguridad por defecto
bento.item4.desc=Hardening de sistemas, auditorías de seguridad y cumplimiento de buenas prácticas desde el primer despliegue.
bento.item5.title=Monitorización continua
bento.item5.desc=Dashboards en tiempo real con Grafana y alertas inteligentes. Sabes lo que pasa en tu infraestructura antes de que te impacte.

