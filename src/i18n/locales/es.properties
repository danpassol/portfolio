features.hero.title=Diseñado para la Excelencia
features.hero.desc=Explora las características poderosas y las opciones arquitectónicas modernas que hacen de Cooper el boilerplate Astro más avanzado del mercado.
features.search=Búsqueda Universal
features.search.desc=Paleta de Comandos integrada (`Cmd+K`) impulsada por Pagefind. Búsqueda estática, ultrarrápida y tolerante a errores tipográficos en todo el contenido.
features.blog=Sistema de Blog Avanzado
features.blog.desc=Blog completo con paginación, feeds RSS, estimación de tiempo de lectura, etiquetas e imágenes de héroe optimizadas.
features.seo=SEO Premium
features.seo.desc=Mapa del sitio automatizado, URLs canónicas y datos estructurados (JSON-LD) para Organizaciones, Productos y Artículos.
features.zerojs=Cero-JS por Defecto
features.zerojs.desc=La Arquitectura de Islas de Astro hidrata solo componentes interactivos, asegurando puntuaciones Lighthouse de 100/100.
features.images=Optimización de Imágenes
features.images.desc=Conversión automática WebP/AVIF y cambio de tamaño responsivo para todos los activos usando la tubería de imágenes nativa de Astro.
features.security=Seguridad Enterprise
features.security.desc=Encabezados de seguridad preconfigurados, CSP y consentimiento de cookies compatible con privacidad con persistencia de almacenamiento local.
features.i18n=Listo para i18n
features.i18n.desc=Estructura de carpetas escalable y lógica de enrutamiento diseñada para internacionalización y localización perfecta.
features.a11y=Accesibilidad Primero
features.a11y.desc=Auditado para cumplimiento WCAG con etiquetas ARIA apropiadas, HTML semántico y soporte de modo oscuro de alto contraste.
features.stack=Stack Tecnológico Moderno
features.stack.desc=Aprovecha el poder de Astro 5, Tailwind CSS 4 y React 18 para una experiencia de desarrollo realmente de vanguardia.
features.controls=Controles Granulares
features.controls.desc=Gestiona características como Búsqueda y Paginación directamente desde `site.config.ts`. Alterna módulos activados o desactivados al instante.
features.types=Contenido Type-Safe
features.types.desc=Aprovecha las Colecciones de Contenido de Astro para validación de tipos estricta en tus archivos de Blog, Documentación y Registro de Cambios.
features.rss=RSS Automatizado
features.rss.desc=Permite que los usuarios se suscriban a tus últimas actualizaciones con feeds RSS generados automáticamente para tu Blog y Registro de Cambios.
features.dev.title=Diseñado para Desarrolladores Modernos
