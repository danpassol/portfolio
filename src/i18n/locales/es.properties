faq.default.title=Preguntas frecuentes
faq.default.subtitle=Lo que suelen preguntar antes de empezar a trabajar juntos.
faq.home.1.q=¿Con qué tipo de empresas trabajas?
faq.home.1.a=Trabajo con PYMEs, startups y empresas medianas que necesitan infraestructura sólida sin mantener un equipo IT interno a tiempo completo. También con autónomos y desarrolladores que necesitan servidores bien configurados.
faq.home.2.q=¿Ofreces soporte continuo o solo proyectos puntuales?
faq.home.2.a=Ambas opciones. Puedo encargarme de un proyecto concreto (migración, hardening, configuración de servidores) o establecer un contrato de mantenimiento mensual con SLA definido y monitorización continua.
faq.home.3.q=¿Trabajas en remoto o también presencialmente?
faq.home.3.a=Principalmente en remoto, lo que me permite trabajar con clientes en cualquier parte de España y Europa. Para proyectos de gran envergadura que lo requieran, puedo desplazarme.
faq.home.4.q=¿Qué tecnologías usas habitualmente?
faq.home.4.a=Linux en general, Kubernetes, Docker, Proxmox, pfSense/OPNsense, Ansible, Zabbix, Grafana, Wazuh y el stack ELK. Para cloud, principalmente sobre infraestructura propia o VPS en AWS.
faq.home.5.q=¿Cómo es el proceso para empezar?
faq.home.5.a=Primero una llamada sin compromiso para entender tus necesidades. Después preparo una propuesta detallada con alcance, plazos y coste. Sin letra pequeña.

faq.pricing.1.q=¿Puedo cambiar planes después?
faq.pricing.1.a=Sí, en cualquier momento con preaviso de 30 días.
faq.pricing.2.q=¿Hay permanencia mínima?
faq.pricing.2.a=No hay permanencia. Los contratos de mantenimiento son mes a mes.
faq.pricing.3.q=¿Qué métodos de pago aceptas?
faq.pricing.3.a=Transferencia bancaria y factura. Para proyectos puntuales, 50% al inicio y 50% a la entrega.
faq.pricing.4.q=¿Ofreces garantía en tus servicios?
faq.pricing.4.a=Sí. Si algo falla por mi parte, lo corrijo sin coste adicional.

