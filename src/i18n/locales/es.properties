about.sitetitle=Sobre mí
about.title=Hola, soy <span class="text-primary">Dani Pastor</span>
about.mission=Estudiante de ASIR y Administrador de sistemas, diseño y mantengo infraestructuras críticas para empresas de todos los tamaños.
about.story.title=Mi trayectoria
about.story.p1=Empecé administrando servidores Linux en casa con maquinas virtuales montando todo lo que veía por internet, y con el tiempo fui especializándome en entornos cada vez más complejos: proxmox, contenedores, redes y seguridad. Hoy gestiono infraestructuras que no pueden permitirse fallar.
about.story.p2=Actualmente estoy estudiando ASIR (Administración de Sistemas Informáticos en Red) aunque en mi tiempo libre me formo con certificaciones y despliego proyectos reales. Próximamente realizaré el master en ciberseguridad.
about.story.p3=Trabajo principalmente con Linux, Kubernetes, herramientas de automatización como Ansible y soluciones de monitorización y seguridad como Zabbix, Wazuh y el stack ELK. Siempre con foco en la fiabilidad y la trazabilidad.
about.why.title=¿Por qué trabajar conmigo?
about.team.title=Habilidades principales
about.feat.fast=Infraestructura Linux
about.feat.fast.desc=Administración avanzada de sistemas Debian, Ubuntu y RHEL en producción.
about.feat.secure=Ciberseguridad
about.feat.secure.desc=Hardening, auditorías, SIEM con Wazuh y análisis de vulnerabilidades.
about.feat.responsive=Contenedores y Kubernetes
about.feat.responsive.desc=Despliegue y gestión de clústeres Kubernetes y entornos Docker en producción.
about.feat.seo=Automatización
about.feat.seo.desc=Infraestructura como código con Ansible y Terraform. Procesos repetibles y auditables.
about.feat.dev=Monitorización
about.feat.dev.desc=Grafana, Zabbix y stack ELK para visibilidad completa de la infraestructura.
about.feat.comp=Redes y firewalls
about.feat.comp.desc=Diseño de redes, VLANs, VPNs y firewalls con pfSense y OPNsense.

about.timeline.title=Trayectoria
about.timeline.1.date=2023
about.timeline.1.title=Primeros pasos
about.timeline.1.desc=Desde pequeño sabía que me quería dedicar a esto, es por ello que entré en el Grado Medio de SMR (Sistemas MicroInformáticos y redes) en el Ies Henri Matisse de Valencia donde me dí cuenta que lo mío era la parte de sistemas.
about.timeline.2.date=2025
about.timeline.2.title=Grado Superior ASIR
about.timeline.2.desc=Entré en el grado superior en el CIPFP Mislata, donde estoy ahora mismo, especializándome en Redes y despliegues de servicios como OPNsense, herramientas de monitorización, clustering con kubernetes...
about.timeline.3.date=2026
about.timeline.3.title=Consultoría independiente
about.timeline.3.desc=Compagino mis estudios con ciertos trabajos a pequeñas y medianas empresas, montando redes, desplegando EDRs, realizando auditorías y todo tipo de proyectos.
about.timeline.4.date=Próximamente
about.timeline.4.title=Máster en Ciberseguridad
about.timeline.4.desc=Formación avanzada en CETI: SIEM, análisis forense, seguridad ofensiva y defensiva.

