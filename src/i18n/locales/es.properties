about.sitetitle=Sobre mí
about.title=Hola, soy <span class="text-primary">Dani Pastor</span>
about.mission=Administrador de sistemas con más de 6 años de experiencia diseñando y manteniendo infraestructuras críticas para empresas de todos los tamaños.
about.story.title=Mi trayectoria
about.story.p1=Empecé administrando servidores Linux en una empresa local, y con el tiempo fui especializándome en entornos cada vez más complejos: virtualización, contenedores, redes y seguridad. Hoy gestiono infraestructuras que no pueden permitirse fallar.
about.story.p2=Me formé en Administración de Sistemas y llevo años ampliando esa base con certificaciones y proyectos reales. Actualmente cursando el Máster en Ciberseguridad en CETI, donde profundizo en seguridad ofensiva y defensiva, SIEM y análisis forense.
about.story.p3=Trabajo principalmente con Linux, Kubernetes, herramientas de automatización como Ansible y Terraform, y soluciones de monitorización y seguridad como Zabbix, Wazuh y el stack ELK. Siempre con foco en la fiabilidad y la trazabilidad.
about.why.title=¿Por qué trabajar conmigo?
about.team.title=Habilidades principales
