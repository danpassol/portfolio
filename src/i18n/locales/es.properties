features.hero.title=Servicios técnicos especializados
features.hero.desc=Infraestructura, seguridad y automatización para empresas que necesitan sistemas fiables y bien diseñados.
features.search=Administración de sistemas
features.search.desc=Gestión integral de servidores Linux en producción. Instalación, configuración, hardening, actualizaciones y mantenimiento continuo.
features.blog=Kubernetes y contenedores
features.blog.desc=Diseño y operación de clústeres Kubernetes. Despliegue de aplicaciones en contenedores con alta disponibilidad y escalabilidad.
features.seo=Ciberseguridad
features.seo.desc=Auditorías de seguridad, hardening de sistemas, implementación de SIEM con Wazuh y análisis de vulnerabilidades.
features.zerojs=Infraestructura como código
features.zerojs.desc=Automatización completa con Ansible y Terraform. Infraestructura reproducible, versionada y documentada.
features.images=Monitorización y observabilidad
features.images.desc=Implementación de Grafana, Zabbix y stack ELK para visibilidad total de la infraestructura en tiempo real.
features.security=Redes y firewalls
features.security.desc=Diseño de arquitecturas de red, VLANs, VPNs site-to-site y configuración de firewalls con pfSense y OPNsense.
features.i18n=Backup y recuperación
features.i18n.desc=Estrategias de backup automatizadas con pruebas de restauración periódicas. RTO y RPO definidos y garantizados.
features.a11y=Soporte y consultoría
features.a11y.desc=Soporte técnico continuo con SLA definido. Consultoría para toma de decisiones tecnológicas y planificación de infraestructura.
features.stack=Virtualización
features.stack.desc=Despliegue y gestión de entornos virtualizados con Proxmox. Optimización de recursos y alta disponibilidad.
features.controls=Migración cloud
features.controls.desc=Migraciones a infraestructura cloud o híbrida sin downtime. Planificación detallada y ejecución controlada.
features.types=CI/CD y automatización
features.types.desc=Pipelines de integración y despliegue continuo. Menos tiempo manual, más fiabilidad en cada release.
features.rss=Documentación técnica
features.rss.desc=Toda la infraestructura queda documentada. Runbooks, diagramas de red y procedimientos de operación actualizados.
features.dev.title=Tecnología al servicio del negocio

