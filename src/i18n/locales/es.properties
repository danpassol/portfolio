about.feat.fast.desc=Administración avanzada de sistemas Debian, Ubuntu y RHEL en producción.
about.feat.secure=Ciberseguridad
about.feat.secure.desc=Hardening, auditorías, SIEM con Wazuh y análisis de vulnerabilidades.
about.feat.responsive=Contenedores y Kubernetes
about.feat.responsive.desc=Despliegue y gestión de clústeres Kubernetes y entornos Docker en producción.
about.feat.seo=Automatización
about.feat.seo.desc=Infraestructura como código con Ansible y Terraform. Procesos repetibles y auditables.
about.feat.dev=Monitorización
about.feat.dev.desc=Grafana, Zabbix y stack ELK para visibilidad completa de la infraestructura.
about.feat.comp=Redes y firewalls
about.feat.comp.desc=Diseño de redes, VLANs, VPNs y firewalls con pfSense y OPNsense.

